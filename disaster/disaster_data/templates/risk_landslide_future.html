<!DOCTYPE html>
<html>
{% load static %}
<head>
    <meta charset="utf-8">
    <title>Landslide Risk Score Heatmap</title>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>

    <!-- Leaflet Heatmap plugin -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100%; width: 100%; }

        /* Loader */
        #loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            display: none;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: white;
            padding: 8px;
            font: 12px Arial, sans-serif;
            border-radius: 5px;
            line-height: 18px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">Loading heatmap...</div>

    <!-- Map -->
    <div id="map"></div>

    <script>
    $(document).ready(function(){
    var map = L.map('map'); 

    // Dark basemap
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Show loader
    $("#loader").show();

    // Fetch live data from Django API for heatmap
    $.getJSON("{% url 'landslide_heatmap_api' %}", function(data){
        var heatData = data.map(function(d){
            return [d.lat, d.lon, d.risk];
        });

        L.heatLayer(heatData, {
            radius: 20,
            blur: 15,
            gradient: {
                0.0: '#0be5f5ff', // Low risk
                0.5: '#e5ff00ff', // Medium risk
                1.0: '#ff0000'  // High risk
            }
        }).addTo(map);

        // Hide loader
        $("#loader").fadeOut();
    });


    // Load GeoJSON boundaries from static folder
   $.getJSON("{% static 'geojson/countries.geojson' %}", function(boundaryData) {
    var boundaryLayer = L.geoJSON(boundaryData, {
        style: function () {
            return {
                color: "#ffffff", // White outline
                weight: 1.5,
                fillOpacity: 0
            };
        }
    }).addTo(map);

    // Fit map to boundary extent
    map.fitBounds(boundaryLayer.getBounds());
});


    // Add legend
    var legend = L.control({position: 'bottomleft'});
    legend.onAdd = function () {
        var div = L.DomUtil.create('div', 'legend');
        var grades = ['Low', 'Medium', 'High'];
        var colors = ['#0be5f5ff', '#e5ff00ff', '#ff0000'];
        for (var i = 0; i < grades.length; i++) {
            div.innerHTML += '<i style="background:' + colors[i] + '"></i> ' + grades[i] + '<br>';
        }
        return div;
    };
    legend.addTo(map);
});

    </script>
</body>
</html>
